# Host nginx for transfera.ae — TLS terminates here; routes to the compose services.
# Install:  cp deploy/nginx-transferra.conf /etc/nginx/sites-available/transferra
#           ln -s /etc/nginx/sites-available/transferra /etc/nginx/sites-enabled/
#           nginx -t && systemctl reload nginx
server {
    listen 80;
    server_name transfera.ae www.transfera.ae 31.97.45.33;

    client_max_body_size 25m;   # website media uploads via admin

    # Backend API → standalone Nest backend (:3002)
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded media (served by the backend from /app/uploads)
    location /uploads/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → Next.js frontend (:3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
# After DNS → 31.97.45.33:  certbot --nginx -d transfera.ae -d www.transfera.ae
# (adds the :443 server block + auto-renew; then drop http://31.97.45.33 from CORS_ORIGINS).
